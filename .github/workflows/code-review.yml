name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  review:
    name: Automated Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Review with Claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            Review this pull request focusing on:
            - TypeScript type errors or unsafe patterns in the frontend
            - Rust correctness, panics, or unwrap() misuse in the backend
            - Security issues (auth, input validation, injection)
            - Logic bugs or edge cases

            Keep feedback concise and actionable. Skip style nits.
