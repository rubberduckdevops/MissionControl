# HTTP — redirect everything to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name mc.rubberduck.work;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mc.rubberduck.work;

    ssl_certificate     /etc/letsencrypt/live/mc.rubberduck.work/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mc.rubberduck.work/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains"                                                                             always;
    add_header X-Content-Type-Options    "nosniff"                                                                                                         always;
    add_header X-Frame-Options           "DENY"                                                                                                            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                                                                                 always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=(), usb=()"                                                    always;

    # Hide upstream server identity
    proxy_hide_header X-Powered-By;
    proxy_hide_header Server;

    # API + health → backend
    location ~ ^/(api|health)(/|$) {
        proxy_pass         http://127.0.0.1:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Frontend
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
